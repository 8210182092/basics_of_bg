<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basics of Bhagavad Gita - KBC Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    body {
      min-height: 100vh;
      color: #fff;
      background: radial-gradient(circle at 50% 50%, #101642 0%, #05071a 60%, #010207 100%);
      overflow-x: hidden;
      padding: 30px 20px;
    }
    /* KBC Cosmic BG Elements */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 20%, rgba(0, 210, 255, 0.2), transparent 35%),
        radial-gradient(circle at 85% 80%, rgba(255, 204, 0, 0.15), transparent 40%);
      pointer-events: none;
      z-index: 1;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: clamp(2rem, 4.5vw, 3.8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      background: linear-gradient(180deg, #fff 20%, #ffcc00 60%, #ff9900 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.6));
    }
    header p {
      font-size: clamp(0.95rem, 1.8vw, 1.25rem);
      color: #00d2ff;
      margin-top: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
    }

    /* KBC Central Scoreboard Display */
    .book-wrap {
      max-width: 1000px;
      margin: 0 auto 45px;
      position: relative;
      z-index: 2;
    }
    .kbc-display {
      background: linear-gradient(145deg, #0a1136, #030617);
      border: 3px solid #ffcc00;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 204, 0, 0.25), inset 0 0 20px rgba(0, 210, 255, 0.15);
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      overflow: hidden;
    }
    .display-panel {
      padding: 35px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .display-panel.left {
      border-right: 2px dashed rgba(255, 204, 0, 0.3);
      background: rgba(0, 0, 0, 0.2);
    }
    .book-title {
      font-size: 1.8rem;
      color: #ffcc00;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
    }
    .poster {
      width: 100%;
      max-width: 320px;
      height: auto;
      aspect-ratio: 16/10;
      object-fit: cover;
      border: 3px solid #00d2ff;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
    }

    .score-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
      margin-bottom: 20px;
    }
    .score-tile {
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.05), rgba(0, 210, 255, 0.15));
      border: 1.5px solid #00d2ff;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.1);
    }
    .score-tile strong {
      display: block;
      font-size: 1.8rem;
      color: #ffcc00;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(255, 204, 0, 0.3);
    }
    .score-tile span {
      font-size: 0.85rem;
      color: #cbd7ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reset-btn {
      padding: 12px 30px;
      border-radius: 30px;
      border: 2px solid #ff4444;
      background: transparent;
      color: #ff4444;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .reset-btn:hover {
      background: #ff4444;
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
      transform: translateY(-2px);
    }

    /* KBC Grid System */
    .chapters-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 2;
    }
    .chapter-card {
      background: linear-gradient(90deg, rgba(12, 22, 69, 0.95) 0%, rgba(5, 9, 36, 0.95) 100%);
      border: 2px solid #00d2ff;
      border-radius: 40px; /* Pointy diamond side vibe */
      padding: 15px 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(0, 210, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .chapter-card:hover {
      border-color: #ffcc00;
      box-shadow: 0 0 25px rgba(255, 204, 0, 0.3);
      transform: scale(1.01);
    }
    
    .chapter-info {
      flex: 1;
    }
    .chapter-title {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.4;
    }
    .question-count-tag {
      display: inline-block;
      font-size: 0.8rem;
      color: #ffcc00;
      background: rgba(255, 204, 0, 0.1);
      border: 1px solid rgba(255, 204, 0, 0.4);
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 6px;
      font-weight: 600;
    }

    /* KBC Diamond Locked/Active Play Button Buttons */
    .part-link {
      text-decoration: none;
      color: #ffcc00;
      background: linear-gradient(90deg, #121e52 0%, #1b2e7a 100%);
      border: 2px solid #ffcc00;
      border-radius: 10px;
      padding: 12px 25px;
      min-width: 170px;
      text-align: center;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
      transition: all 0.25s ease;
    }
    .part-link:hover {
      background: linear-gradient(90deg, #ffcc00 0%, #ff9900 100%);
      color: #030617;
      box-shadow: 0 0 20px #ffcc00;
      transform: translateY(-2px);
    }
    .part-link.completed {
      background: linear-gradient(90deg, #054020 0%, #0b7a3e 100%);
      border-color: #00ff77;
      color: #fff;
      box-shadow: 0 0 15px rgba(0, 255, 119, 0.3);
    }
    .part-score {
      font-size: 0.75rem;
      font-weight: 600;
      color: #00d2ff;
    }
    .part-link.completed .part-score {
      color: #ffcc00;
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      body { padding: 15px 10px; }
      .kbc-display { grid-template-columns: 1fr; }
      .display-panel.left { border-right: none; border-bottom: 2px dashed rgba(255, 204, 0, 0.3); padding: 25px; }
      .display-panel.right { padding: 25px; }
      .chapter-card {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        border-radius: 20px;
        padding: 20px;
      }
      .part-link { width: 100%; }
    }
  </style>
</head>
<body>

  <audio id="dashboard-theme" autoplay loop preload="auto">
    <source src="SP_Bhajans_04_-_Hare_Krsna_Maha_Mantra.mp3" type="audio/mpeg">
  </audio>

  <header>
    <h1>Basics of Bhagavad Gita</h1>
    <p>महाक्विज अभियान — 7 अध्याय, अद्भुत प्रश्नोत्तरी</p>
  </header>

  <section class="book-wrap">
    <div class="kbc-display">
      <div class="display-panel left">
        <h2 class="book-title">श्रीमद्भगवद्गीता ज्ञान</h2>
        <img src="Gemini_Generated_Image_sjhv7nsjhv7nsjhv.png" alt="गीता पोस्टर" class="poster" onerror="this.src='https://placehold.co/700x420?text=Bhagavad+Gita'">
      </div>
      <div class="display-panel right">
        <h2 class="book-title">आपका स्कोरबोर्ड</h2>
        <div class="score-summary">
          <div class="score-tile"><strong id="total-played">0</strong><span>पूर्ण अध्याय</span></div>
          <div class="score-tile"><strong id="total-correct">0/0</strong><span>सही उत्तर</span></div>
          <div class="score-tile"><strong id="total-wrong">0</strong><span>गलत उत्तर</span></div>
          <div class="score-tile"><strong id="total-score">0</strong><span>कुल अंक</span></div>
        </div>
        <button class="reset-btn" onclick="resetScores()">स्कोर रीसेट करें</button>
      </div>
    </div>
  </section>

  <main class="chapters-container" id="chapters-grid"></main>

  <script>
    const gitaChapters = [
      { name: "Chapter 1 - Introduction", questions: 30 },
      { name: "Chapter 2 - Sri Bhagavan (The Existence and Nature of God)", questions: 40 },
      { name: "Chapter 3 - The Soul (Who Am I?)", questions: 40 },
      { name: "Chapter 4 - The Cycle of Life and the Laws of Karma", questions: 40 },
      { name: "Chapter 5 - Material Nature and Time", questions: 40 },
      { name: "Chapter 6 - Different Types of Yoga and the Supreme Yoga System", questions: 40 },
      { name: "Chapter 7 - Practical Application of the Bhagavad Gita", questions: 40 }
    ];

    function getProgress() {
      try {
        return JSON.parse(localStorage.getItem("gita_quiz_progress_v2")) || {};
      } catch (e) {
        return {};
      }
    }

    function partHref(ch) {
      return `index108.html?chapter=${ch}`;
    }

    function normalizeChapterData(data, totalQuestions) {
      if (!data) return null;
      const correct = Number(data.correct || 0);
      const incorrect = Number(data.incorrect || 0);
      const score = Number(data.score !== undefined ? data.score : Math.max(0, correct - incorrect));
      return { correct, incorrect, total: totalQuestions, score };
    }

    function renderDashboard() {
      const progress = getProgress();
      const container = document.getElementById("chapters-grid");
      container.innerHTML = "";

      let totalPlayed = 0;
      let totalCorrect = 0;
      let totalWrong = 0;
      let totalScore = 0;
      let totalQuestionsSum = 0;

      gitaChapters.forEach((chData, index) => {
        const chNum = index + 1;
        const key = `ch_${chNum}`;
        const data = normalizeChapterData(progress[key], chData.questions);
        
        const card = document.createElement("section");
        card.className = "chapter-card";

        // Info Block
        const infoDiv = document.createElement("div");
        infoDiv.className = "chapter-info";
        infoDiv.innerHTML = `
          <div class="chapter-title">${chData.name}</div>
          <div class="question-count-tag">${chData.questions} Questions</div>
        `;

        // Interactive Button Block
        const link = document.createElement("a");
        link.href = partHref(chNum);
        
        if (data) {
          link.className = "part-link completed";
          link.innerHTML = `
            <span>खेला गया</span>
            <span class="part-score">सही: ${data.correct}/${data.total} | अंक: ${data.score}</span>
          `;
          totalPlayed++;
          totalCorrect += data.correct;
          totalWrong += data.incorrect;
          totalScore += data.score;
          totalQuestionsSum += data.total;
        } else {
          link.className = "part-link";
          link.innerHTML = `
            <span>क्विज शुरू करें</span>
            <span class="part-score">Let's Play</span>
          `;
        }

        card.appendChild(infoDiv);
        card.appendChild(link);
        container.appendChild(card);
      });

      // Update Top Status Panels
      document.getElementById("total-played").textContent = `${totalPlayed} / 7`;
      document.getElementById("total-correct").textContent = `${totalCorrect}/${totalQuestionsSum || 270}`;
      document.getElementById("total-wrong").textContent = totalWrong;
      document.getElementById("total-score").textContent = totalScore;
    }

    function resetScores() {
      if (confirm("क्या आप सभी scores reset करना चाहते हैं?")) {
        localStorage.removeItem("gita_quiz_progress_v2");
        localStorage.removeItem("last_played_quiz_score");
        renderDashboard();
      }
    }

    window.addEventListener("load", () => {
      renderDashboard();
      document.body.addEventListener("click", () => {
        const audio = document.getElementById("dashboard-theme");
        if (audio && audio.paused) audio.play().catch(() => {});
      }, { once: true });
    });
  </script>
</body>
</html>
