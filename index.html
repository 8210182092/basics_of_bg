<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of Bhagavad Gita - Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #180133 0%, #03000a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* MASTER STUDIO WRAPPER (Side-by-Side Presentation Deck) */
        .studio-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            z-index: 10;
        }

        /* 3D VEDIC LIVE VIDEO THEATER PANEL (Left Side) */
        .video-theater-deck {
            position: relative;
            width: 360px; /* Optimized aspect ratio for shorts layout content */
            height: 640px;
            background: #000;
            border: 6px solid #ffcc00;
            border-radius: 35px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(255, 170, 0, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-theater-deck iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Focuses absolute interaction tracking exclusively on our buttons */
        }

        /* Elegant Neon Live Frame Badge Overlay */
        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ff0055;
            color: #fff;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px #ff0055;
            animation: pulseGlow 1.5s infinite ease-in-out;
            z-index: 5;
        }

        /* VEDIC TEMPLE ROYAL ENTRY ARCH CONSOLE (Right Side) */
        .temple-archway {
            position: relative;
            background: linear-gradient(135deg, rgba(38, 4, 71, 0.9) 0%, rgba(12, 0, 24, 0.98) 100%);
            border: 5px solid #ffcc00;
            border-top: 20px solid #ffaa00; 
            border-radius: 80px 80px 40px 40px; 
            padding: 50px 40px 40px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.9),
                0 0 60px rgba(255, 170, 0, 0.3),
                inset 0 0 25px rgba(255, 204, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .sacred-logo {
            font-size: 5rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(255, 170, 0, 0.6));
        }

        .title-main {
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff 30%, #ffcc00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
            margin-bottom: 4px;
        }

        .title-sub {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 35px;
            text-shadow: 0 0 12px rgba(0, 255, 204, 0.7);
        }

        /* INPUT FIELD ARCHITECTURE */
        .input-portal {
            margin-bottom: 30px;
        }

        .devotee-input-field {
            width: 100%;
            padding: 18px 25px;
            border-radius: 50px;
            border: 3px solid #ffcc00;
            background: #090012;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-shadow: inset 0 6px 12px rgba(0,0,0,1);
            transition: all 0.3s ease;
        }

        .devotee-input-field:focus {
            border-color: #00ffcc;
            box-shadow: inset 0 6px 12px rgba(0,0,0,1), 0 0 25px rgba(0, 255, 204, 0.6);
        }

        /* 3D ACTION LOCK BUTTON */
        .button-3d-deck {
            position: relative;
            width: 100%;
            height: 90px;
            margin-bottom: 25px;
        }

        .kbc-grand-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: linear-gradient(to bottom, #ff9400 0%, #cc5200 100%);
            border: 3px solid #ffffff;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            box-shadow: 
                0 12px 0 #803300, 
                0 18px 30px rgba(0,0,0,0.7), 
                0 0 40px rgba(255,148,0,0.3);
            text-shadow: 0 4px 0 #732e00;
            transition: all 0.1s ease;
        }

        .kbc-grand-btn:hover {
            background: linear-gradient(to bottom, #ffa51f 0%, #dd5d00 100%);
            box-shadow: 0 14px 0 #803300, 0 22px 35px rgba(255,148,0,0.5);
            transform: translateY(-2px);
        }

        .kbc-grand-btn:active {
            transform: translateY(10px) !important;
            box-shadow: 0 2px 0 #803300, 0 5px 15px rgba(0,0,0,0.7);
        }

        /* ETIQUETTE INFORMATION BOARD */
        .etiquette-board {
            background: rgba(255, 204, 0, 0.12);
            border: 3px dashed #ffcc00;
            border-radius: 25px;
            padding: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .etiquette-board:hover {
            background: rgba(0, 255, 204, 0.18);
            border-color: #00ffcc;
            transform: scale(1.02);
        }

        .board-tag {
            color: #00ffcc; 
            font-weight: 900; 
            display: block; 
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .board-body {
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }

        /* MASTER AUDIO CONTROL UNIT BUTTON */
        .sound-switch {
            margin-top: 30px;
            background: rgba(9, 0, 18, 0.95);
            border: 3px solid #ffcc00;
            color: #ffcc00;
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            z-index: 100;
            transition: all 0.2s ease;
        }
        .sound-switch:hover {
            background: #ffcc00;
            color: #03000a;
        }

        @media (max-width: 900px) {
            .studio-container {
                flex-direction: column;
                gap: 30px;
            }
            .video-theater-deck {
                width: 320px;
                height: 568px;
            }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px #ff0055); }
            50% { opacity: 0.6; filter: drop-shadow(0 0 5px #ff0055); }
        }
    </style>
</head>
<body>

    <!-- MASTER STUDIO INTERFACE WRAPPER -->
    <div class="studio-container">
        
        <!-- VIDEO THEATER DECK (LEFT PANEL) -->
        <div class="video-theater-deck">
            <div class="live-badge">VEDIC STREAM</div>
            <div id="player"></div>
        </div>

        <!-- TEMPLE INTERACTIVE ARCHWAY CONSOLE (RIGHT PANEL) -->
        <div class="temple-archway">
            <div class="sacred-logo">𓎹✨</div>
            <h1 class="title-main">Basics</h1>
            <p class="title-sub">of Bhagavad Gita</p>

            <!-- Devotee Identity Field -->
            <div class="input-portal">
                <input type="text" id="devoteeNameInput" class="devotee-input-field" placeholder="Enter Your Name... 🙌" autocomplete="off">
            </div>

            <!-- Lock Answer Button -->
            <div class="button-3d-deck">
                <button class="kbc-grand-btn" id="lockOptionBtn">Lock Option</button>
            </div>

            <!-- Nectar Wisdom Board -->
            <div class="etiquette-board" id="nectarDeck">
                <span class="board-tag">✨ Basics of Bhagavad Gita Nectar (Tap)</span>
                <span class="board-body" id="nectarText">The Bhagavad-gita can be consulted in all critical times, not only for solace from all kinds of mental agonies, but also for the way out of great entanglements which may embarrass one in some critical hour.</span>
            </div>
        </div>

    </div>

    <!-- AUDIO CONTROLLER LINK SWITCH -->
    <button class="sound-switch" id="audioBtn">🎵 Game Audio: Off</button>

    <!-- YouTube Frame Engine Script Integration -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var videoPlayList = ['zCVpu_nZkXQ', 'H-pD_dGWteU', 'E9g05bZ7HCY', 'XOXic6PqE6I'];
        var currentVideoIndex = 0;
        var player;
        var soundActive = false;
        var soundEngine;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoPlayList[currentVideoIndex],
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'mute': 1, 
                    'iv_load_policy': 3,
                    'origin': window.location.origin,
                    'playsinline': 1
                },
                events: {
                    'onReady': function(e) {
                        e.target.playVideo();
                    },
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                advancePlaylist();
            }
        }

        function onPlayerError(event) {
            console.log("Stream transition bypassed safely.");
            advancePlaylist();
        }

        function advancePlaylist() {
            currentVideoIndex++;
            if (currentVideoIndex >= videoPlayList.length) {
                currentVideoIndex = 0; 
            }
            
            player.loadVideoById({
                videoId: videoPlayList[currentVideoIndex]
            });
            
            // Re-verify sound settings upon track switching
            setTimeout(() => {
                if (soundActive && player && typeof player.unMute === 'function') {
                    player.unMute();
                    player.setVolume(85);
                    player.playVideo();
                }
            }, 500);
        }
    </script>

    <script>
        // --- Synthesized Audio Engine Activation ---
        function initAudioEngine() {
            if (!soundEngine) {
                soundEngine = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (soundEngine.state === 'suspended') {
                soundEngine.resume();
            }
        }

        function playSfx(variant) {
            if (!soundActive || !soundEngine) return;
            let oscillator = soundEngine.createOscillator();
            let gainNode = soundEngine.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(soundEngine.destination);

            if (variant === 'hover') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, soundEngine.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(900, soundEngine.currentTime + 0.12);
                gainNode.gain.setValueAtTime(0.07, soundEngine.currentTime);
                oscillator.start(); oscillator.stop(soundEngine.currentTime + 0.12);
            } else if (variant === 'press') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(180, soundEngine.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1400, soundEngine.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.3, soundEngine.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, soundEngine.currentTime + 0.4);
                oscillator.start(); oscillator.stop(soundEngine.currentTime + 0.4);
            }
        }

        // MASTER AUDIO MANAGEMENT TOGGLE
        document.getElementById('audioBtn').addEventListener('click', function(e) {
            initAudioEngine();
            soundActive = !soundActive;
            
            if (soundActive) {
                this.innerText = "🎵 Game Audio: On";
                // Explicitly wake and unmute the frame player assets directly
                if (player && typeof player.unMute === 'function') {
                    player.unMute();
                    player.setVolume(85);
                    player.playVideo();
                }
            } else {
                this.innerText = "🎵 Game Audio: Off";
                if (player && typeof player.mute === 'function') {
                    player.mute();
                }
            }
        });

        // --- Vaishnava Sadachara Instruction Wisdom Databanks ---
        const sadacharaWisdom = [
            "Never was there a time when I did not exist, nor you, nor all these kings; nor in the future shall any of us cease to be. As the embodied soul continually passes, in this body, from boyhood to youth to old age, the soul similarly passes into another body at death. The self-realized soul is not bewildered by such a change.",
            "For the soul there is never birth nor death at any time. He has not come into being, does not come into being, and will not come into being. He is unborn, eternal, ever-existing and primeval. He is not slain when the body is slain.",
            "You have a right to perform your prescribed duty, but you are not entitled to the fruits of action. Never consider yourself the cause of the results of your activities, and never be attached to not doing your duty.",
            "The Bhagavad-gita can be consulted in all critical times, not only for solace from all kinds of mental agonies, but also for the way out of great entanglements which may embarrass one in some critical hour."
        ];

        const nectarDeck = document.getElementById('nectarDeck');
        nectarDeck.addEventListener('mouseenter', () => playSfx('hover'));
        nectarDeck.addEventListener('click', () => {
            initAudioEngine();
            document.getElementById('nectarText').innerText = sadacharaWisdom[Math.floor(Math.random() * sadacharaWisdom.length)];
        });

        // --- GATE NAVIGATION LAUNCHER ROUTING ---
        const lockOptionBtn = document.getElementById('lockOptionBtn');
        lockOptionBtn.addEventListener('mouseenter', () => playSfx('hover'));
        
        lockOptionBtn.addEventListener('click', function(e) {
            e.preventDefault();
            initAudioEngine();
            const inputData = document.getElementById('devoteeNameInput').value.trim();
            
            if (inputData === "") {
                alert("Please enter your name to unlock the Sadachara Challenge! 🙏");
                return;
            }

            localStorage.setItem("quizPlayerName", inputData);
            playSfx('press');

            setTimeout(() => {
                window.location.assign("gita_quiz_full.html");
            }, 300);
        });
    </script>
</body>
</html>
